<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSPIRACY.GAME // CIVIC ENGINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #050505;
      --card: #0F0F0F;
      --card-hover: #161616;
      --white: #F2F2F2;
      --white-70: rgba(242,242,242,0.70);
      --white-40: rgba(242,242,242,0.40);
      --white-20: rgba(242,242,242,0.20);
      --white-08: rgba(242,242,242,0.08);
      --white-04: rgba(242,242,242,0.04);
      --green: #39FF14;
      --green-70: rgba(57,255,20,0.70);
      --green-20: rgba(57,255,20,0.20);
      --green-08: rgba(57,255,20,0.08);
      --red: #FF3333;
      --red-20: rgba(255,51,51,0.20);
      --red-08: rgba(255,51,51,0.08);
      --orange: #FF8C00;
      --border: rgba(242,242,242,0.08);
      --border-green: rgba(57,255,20,0.30);
      --border-red: rgba(255,51,51,0.30);
      --display: 'Barlow Condensed', 'Impact', sans-serif;
      --body: 'DM Sans', 'Helvetica Neue', sans-serif;
      --mono: 'IBM Plex Mono', 'Courier New', monospace;
      --glow-green: 0 0 24px rgba(57,255,20,0.25);
      --glow-red: 0 0 24px rgba(255,51,51,0.25);
    }

    html, body { background: var(--black); min-height: 100vh; }

    .root {
      min-height: 100vh;
      background: var(--black);
      font-family: var(--body);
      font-size: 15px;
      color: var(--white);
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle scanline */
    .root::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 3px
      );
    }

    .wrap { max-width: 960px; margin: 0 auto; padding: 0 24px; }
    .screen { animation: fadeUp 0.3s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    @keyframes pulse-red {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes glitch-a {
      0%,88%,100% { transform: translateX(0); opacity: 0; }
      90%  { transform: translateX(3px); opacity: .5; clip-path: inset(15% 0 70% 0); }
      92%  { transform: translateX(-2px); opacity: .5; clip-path: inset(40% 0 40% 0); }
      94%  { opacity: 0; }
    }
    @keyframes glitch-b {
      0%,88%,100% { transform: translateX(0); opacity: 0; }
      91%  { transform: translateX(-3px); opacity: .5; clip-path: inset(60% 0 15% 0); }
      93%  { transform: translateX(2px); opacity: .5; clip-path: inset(30% 0 50% 0); }
      95%  { opacity: 0; }
    }

    /* ── HEADER ─────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5,5,5,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0;
    }
    .logo-block {}
    .logo {
      font-family: var(--display);
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--green);
      position: relative;
      display: inline-block;
      line-height: 1;
      text-shadow: var(--glow-green);
    }
    .logo::before {
      content: attr(data-text);
      position: absolute; top: 0; left: 2px;
      color: var(--red);
      clip-path: inset(15% 0 65% 0);
      animation: glitch-a 6s infinite;
      opacity: 0.5;
    }
    .logo::after {
      content: attr(data-text);
      position: absolute; top: 0; left: -2px;
      color: #0066FF;
      clip-path: inset(60% 0 15% 0);
      animation: glitch-b 6s infinite;
      opacity: 0.5;
    }
    .logo-sub {
      display: block;
      font-family: var(--mono);
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 3px;
      color: var(--white-40);
      margin-top: 4px;
    }
    .vp-block { text-align: right; }
    .vp-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--white-40);
      text-transform: uppercase;
    }
    .vp-row { display: flex; align-items: baseline; gap: 10px; justify-content: flex-end; margin-top: 2px; }
    .vp-num {
      font-family: var(--display);
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--green);
      line-height: 1;
      text-shadow: var(--glow-green);
    }
    .vp-rank {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--green-70);
      border: 1px solid var(--green-20);
      padding: 2px 7px;
    }

    /* ── API BANNER ─────────────────────────────────────── */
    .api-banner {
      background: var(--green-08);
      border-bottom: 1px solid var(--border-green);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .api-banner-text {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--green-70);
      flex-shrink: 0;
    }
    .api-input {
      background: var(--black);
      border: 1px solid var(--border-green);
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 7px 12px;
      flex: 1; min-width: 200px;
    }
    .api-input:focus { outline: none; border-color: var(--green); }
    .api-save-btn {
      background: var(--green);
      color: #000;
      border: none;
      font-family: var(--mono);
      font-weight: 500;
      font-size: 0.7rem;
      letter-spacing: 2px;
      padding: 7px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .api-save-btn:hover { opacity: 0.85; }
    .api-dismiss {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--white-40);
      cursor: pointer;
      margin-left: auto;
    }

    /* ── SHARED ELEMENTS ────────────────────────────────── */
    .section-eyebrow {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--green);
      text-transform: uppercase;
    }
    .box-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 3px;
      color: var(--green);
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white-40);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 2px;
      padding: 8px 16px;
      cursor: pointer;
      margin-bottom: 24px;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { border-color: var(--green); color: var(--green); }
    .divider { height: 1px; background: var(--border); margin: 0 0 20px; }

    /* ── HUB ────────────────────────────────────────────── */
    .hub { padding: 28px 0; }
    .hub-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .hub-count {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--white-40);
      letter-spacing: 2px;
    }
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white-40);
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .filter-btn:hover { border-color: var(--white-20); color: var(--white-70); }
    .filter-active {
      border-color: var(--green) !important;
      color: var(--green) !important;
      background: var(--green-08) !important;
    }

    .case-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (max-width: 640px) { .case-grid { grid-template-columns: 1fr; } }

    .case-card {
      border: 1px solid var(--border);
      background: var(--card);
      padding: 20px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
    }
    .case-card::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 3px; height: 100%;
      background: var(--green);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }
    .case-card:hover {
      background: var(--card-hover);
      border-color: var(--white-20);
    }
    .case-card:hover::after { transform: scaleY(1); }

    .card-eyebrow {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 3px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .card-codename {
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--white-40);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card-headline {
      font-family: var(--display);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--white);
      margin-bottom: 16px;
      padding-right: 60px;
    }
    .card-diff {
      position: absolute;
      top: 16px; right: 16px;
      font-family: var(--mono);
      font-size: 0.5rem;
      letter-spacing: 2px;
      padding: 3px 7px;
      border: 1px solid;
      text-transform: uppercase;
    }
    .diff-mod { color: var(--green); border-color: var(--green-20); }
    .diff-hard { color: var(--orange); border-color: rgba(255,140,0,0.3); }
    .diff-ext {
      color: var(--red);
      border-color: var(--red-20);
      animation: pulse-red 2s infinite;
    }
    .card-meta {
      display: flex; gap: 16px;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--white-40);
      margin-bottom: 12px;
    }
    .odds-bar { height: 2px; background: var(--white-08); border-radius: 1px; overflow: hidden; }
    .odds-fill { height: 100%; background: var(--green); transition: width 0.3s; }
    .odds-labels {
      display: flex; justify-content: space-between;
      margin-top: 5px;
      font-family: var(--mono);
      font-size: 0.6rem;
    }
    .lbl-confirm { color: var(--green); }
    .lbl-deny { color: var(--red); }

    .hub-footer {
      text-align: center;
      padding: 24px 0;
      border-top: 1px solid var(--border);
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      color: var(--white-20);
      text-transform: uppercase;
    }

    /* ── CASE BRIEF ─────────────────────────────────────── */
    .brief-screen { padding: 24px 0; }

    .case-file {
      border: 1px solid var(--border);
      background: var(--card);
      padding: 28px;
      margin-bottom: 12px;
      position: relative;
    }
    .urgency-tag {
      position: absolute;
      top: 20px; right: 20px;
      font-family: var(--mono);
      font-size: 0.55rem;
      letter-spacing: 2.5px;
      padding: 4px 9px;
      border: 1px solid;
      text-transform: uppercase;
    }
    .urg-low   { color: var(--white-40); border-color: var(--white-20); }
    .urg-med   { color: var(--white-70); border-color: var(--white-40); }
    .urg-high  { color: var(--orange);   border-color: rgba(255,140,0,0.4); }
    .urg-critical {
      color: var(--red); border-color: var(--red-20);
      animation: pulse-red 1.5s infinite;
    }

    .file-eyebrow {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .file-headline {
      font-family: var(--display);
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--white);
      margin-bottom: 18px;
      padding-right: 100px;
    }
    .file-brief {
      font-family: var(--body);
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--white-70);
      margin-bottom: 20px;
    }
    .file-stats {
      display: flex; gap: 24px; flex-wrap: wrap;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--white-40);
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .evidence-box {
      border: 1px solid var(--border);
      background: var(--card);
      padding: 22px;
      margin-bottom: 12px;
    }
    .ev-row {
      display: flex; gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .ev-row:last-child { border-bottom: none; padding-bottom: 0; }
    .ev-key {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--green);
      min-width: 190px;
      flex-shrink: 0;
      line-height: 1.6;
    }
    .ev-val {
      font-family: var(--body);
      font-size: 0.88rem;
      color: var(--white-70);
      line-height: 1.65;
    }
    @media (max-width: 540px) {
      .ev-row { flex-direction: column; }
      .ev-key { min-width: unset; }
    }

    .odds-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .odds-box {
      border: 1px solid var(--border);
      background: var(--card);
      padding: 18px;
      text-align: center;
    }
    .ob-label {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 2.5px;
      color: var(--white-40);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .ob-value {
      font-family: var(--display);
      font-size: 2.8rem;
      font-weight: 800;
      line-height: 1;
    }
    .ob-green { color: var(--green); text-shadow: var(--glow-green); }
    .ob-red   { color: var(--red);   text-shadow: var(--glow-red); }

    .hyp-box {
      border: 1px solid var(--border-green);
      background: var(--green-08);
      padding: 20px;
      margin-bottom: 20px;
    }
    .hyp-quote {
      font-family: var(--display);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--white);
    }

    .cta-btn {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      font-family: var(--display);
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 18px;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    .cta-btn:hover { opacity: 0.9; box-shadow: var(--glow-green); }

    /* ── ANALYSIS ────────────────────────────────────────── */
    .analysis-screen { padding: 24px 0; }
    .screen-head {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--green);
      text-transform: uppercase;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
    }

    .stance-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
    .stance-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white-40);
      font-family: var(--display);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      padding: 18px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stance-btn:hover { border-color: var(--white-20); color: var(--white); }
    .stance-confirm {
      background: var(--green-08) !important;
      border-color: var(--green) !important;
      color: var(--green) !important;
    }
    .stance-deny {
      background: var(--red-08) !important;
      border-color: var(--red) !important;
      color: var(--red) !important;
    }

    .field-label {
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 2.5px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .field-hint {
      font-size: 0.58rem;
      letter-spacing: 1.5px;
      color: var(--white-20);
    }
    .reasoning-area {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: var(--body);
      font-size: 0.95rem;
      line-height: 1.75;
      padding: 18px;
      resize: vertical;
      min-height: 160px;
      transition: border-color 0.2s;
    }
    .reasoning-area:focus { outline: none; border-color: var(--green); }
    .reasoning-area::placeholder { color: var(--white-20); }
    .char-row {
      display: flex; justify-content: space-between;
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--white-40);
    }
    .char-good { color: var(--green); }

    .stake-label-block { margin: 22px 0 10px; }
    .stake-note {
      font-family: var(--body);
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--white-40);
      margin-bottom: 12px;
    }
    .stake-item {
      border: 1px solid var(--border);
      background: var(--card);
      padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
      margin-bottom: 8px;
      transition: border-color 0.2s, background 0.2s;
      font-family: var(--body);
      font-size: 0.9rem;
      color: var(--white-70);
    }
    .stake-item:hover { border-color: var(--white-20); }
    .stake-selected {
      border-color: var(--green) !important;
      background: var(--green-08) !important;
      color: var(--white) !important;
    }
    .stake-time {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--white-40);
      margin-left: 16px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 18px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      margin-top: 4px;
    }
    .submit-btn:hover:not([disabled]) {
      background: var(--green);
      color: #000;
      box-shadow: var(--glow-green);
    }
    .submit-btn[disabled] {
      border-color: var(--white-08);
      color: var(--white-20);
      cursor: not-allowed;
    }

    /* ── LOADING ─────────────────────────────────────────── */
    .loading-screen {
      display: flex; flex-direction: column; align-items: center;
      padding: 80px 0;
    }
    .load-title {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 8px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 36px;
      text-shadow: var(--glow-green);
    }
    .term-line {
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 1px;
      padding: 4px 0;
      animation: fadeUp 0.3s ease both;
      width: 100%;
      max-width: 500px;
      line-height: 1.6;
    }
    .t-ok   { color: var(--green); }
    .t-warn { color: var(--orange); }
    .t-dim  { color: var(--white-20); }
    .blink-cur {
      width: 10px; height: 20px;
      background: var(--green);
      display: inline-block;
      margin-top: 18px;
      animation: blink 0.8s step-start infinite;
      box-shadow: var(--glow-green);
    }

    /* ── VERDICT ─────────────────────────────────────────── */
    .verdict-screen { padding: 24px 0; }
    .verdict-frame {
      border-width: 2px;
      border-style: solid;
      padding: 36px 28px;
      margin-bottom: 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .vf-verified {

function scoreLocally(r, c) {
  const w = r.trim().split(/\s+/).length;
  const refs = c.evidence.filter(e => r.toLowerCase().includes(e.label.toLowerCase().split(" ")[0])).length;
  const s = Math.min(100, Math.max(15, Math.round(w * 1.6 + refs * 12 + 8)));
  const v = s >= 70 ? "VERIFIED" : s >= 40 ? "INSUFFICIENT" : "REJECTED";
  const d = v === "VERIFIED" ? Math.min(30, Math.round((s-60)/2)) : v === "REJECTED" ? -10 : 0;
  return {
    score: s, verdict: v, vpDelta: d,
    summary: `Your analysis ${s >= 60 ? "demonstrates reasonable" : "shows limited"} engagement with the available evidence. ${s >= 70 ? "The reasoning chain is logically structured." : "More specific evidence engagement would strengthen the analytical case."}`,
    strengths: s >= 50 ? ["Formed a clear positional stance", "Engaged with the case context"] : ["Submitted an analysis for community review"],
    weaknesses: s < 70 ? ["Could engage more specifically with individual evidence items", "Consider alternative explanations more explicitly"] : ["Minor logical gaps in the causal chain"],
    conclusion: "Continue developing your investigative methodology to improve your Verification Power score.",
  };
}

                <div className="ca-text">"{getExample(sel.id).text}"</div>
              </div>
              <div className="community-analysis">
                <div className="ca-header">
                  <span className="ca-analyst">ANALYST: NULL_TRACE <span className="ca-stance ca-deny">DENY</span></span>
                  <span className="ca-score" style={{color:"var(--white-70)"}}>72</span>
                </div>
                <div className="ca-text">"The available evidence establishes suspicious patterns but falls short of proving intentionality. Correlation between political connections and contract awards exists in many legitimate procurement processes. The 90-day incorporation timeline is unusual but not impossible. I'd want to see the actual contract specifications and whether the winning bids were competitive on price before confirming the hypothesis."</div>
              </div>
            </div>
          )}

          {verdict.verdict === "REJECTED" ? (
            <>
              <div style={{textAlign:"center",padding:"14px",fontFamily:"var(--mono)",fontSize:"0.7rem",letterSpacing:"2px",color:"var(--red)",border:"1px solid var(--red-20)",background:"var(--red-08)",marginBottom:12}}>
                Intellectual Debt Recorded — Complete your staked task to continue
              </div>
              <button className="action-btn btn-red" onClick={() => setScreen("debt")}>View Debt Obligation →</button>
            </>
          ) : (
            <button className="action-btn btn-green" onClick={reset}>Next Investigation →</button>
          )}
        </div>
      )}

      {/* ── DEBT ── */}
      {screen === "debt" && debt && (
        <div className="wrap debt-screen screen">
          <div className="debt-header">
            <div className="debt-title">Intellectual Debt</div>
            <div className="debt-sub">
              System locked // Case {debt.codename}<br/>
              Your analysis did not meet the quality threshold.<br/>
              Complete your staked research obligation to restore access.
            </div>
          </div>
          <div className="debt-task">
            <div className="debt-task-label">◆ Your Staked Research Obligation</div>
            <div className="debt-task-text">{debt.task}</div>
          </div>
          <div className="honor-text">
            This is an honor system. The platform runs on trust in the investigative process.<br/>
            Do not click below until you have genuinely completed this task.<br/>
            Our collective integrity is the only thing that makes this work matter.
          </div>
          <button className="clear-btn" onClick={clearDebt}>✓ Research Task Completed — Unlock System</button>
        </div>
      )}
