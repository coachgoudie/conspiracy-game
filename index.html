<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROTO.LIFE // CIVIC ENGINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07070F;--bg-card:#0C0C1C;--bg-hover:#111130;
      --border:rgba(255,255,255,0.07);--border-lit:rgba(212,157,32,0.35);
      --amber:#D49D20;--amber-bright:#E8B030;--amber-dim:rgba(212,157,32,0.12);
      --red:#C42200;--red-bright:#E03020;--red-dim:rgba(196,34,0,0.12);
      --green:#00A850;--green-bright:#00CC60;--green-dim:rgba(0,168,80,0.12);
      --text:rgba(255,255,255,0.88);--text-mid:rgba(255,255,255,0.55);
      --text-dim:rgba(255,255,255,0.28);--text-faint:rgba(255,255,255,0.14);
      --mono:'Share Tech Mono','Courier New',monospace;
      --serif:'Special Elite',Georgia,serif;
      --display:'Bebas Neue',Impact,sans-serif;
    }
    html,body{background:var(--bg);min-height:100vh}
    .root{min-height:100vh;background:var(--bg);font-family:var(--mono);color:var(--text);position:relative;overflow-x:hidden}
    .root::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px)}
    .root::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9997;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.6) 100%)}
    .wrap{max-width:900px;margin:0 auto;padding:0 20px}
    .screen{animation:fadeUp .35s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes glitch-a{0%,88%,100%{transform:translateX(0);opacity:0}90%{transform:translateX(3px);opacity:.65;clip-path:inset(10% 0 75% 0)}92%{transform:translateX(-3px);opacity:.65;clip-path:inset(35% 0 45% 0)}94%{opacity:0}}
    @keyframes glitch-b{0%,88%,100%{transform:translateX(0);opacity:0}91%{transform:translateX(-3px);opacity:.65;clip-path:inset(65% 0 10% 0)}93%{transform:translateX(3px);opacity:.65;clip-path:inset(45% 0 35% 0)}95%{opacity:0}}
    .header{padding:16px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;position:sticky;top:0;background:rgba(7,7,15,.95);backdrop-filter:blur(8px);z-index:100}
    .logo{font-family:var(--display);font-size:1.5rem;letter-spacing:5px;color:var(--amber);position:relative;display:inline-block}
    .logo::before{content:attr(data-text);position:absolute;top:0;left:2px;color:var(--red);clip-path:inset(20% 0 60% 0);animation:glitch-a 5s infinite;opacity:.65}
    .logo::after{content:attr(data-text);position:absolute;top:0;left:-2px;color:#1166CC;clip-path:inset(60% 0 20% 0);animation:glitch-b 5s infinite;opacity:.65}
    .logo-sub{font-size:.55rem;letter-spacing:2.5px;color:var(--text-dim);display:block;margin-top:3px}
    .vp-block{text-align:right}
    .vp-label{font-size:.55rem;letter-spacing:2.5px;color:var(--text-dim)}
    .vp-num{font-family:var(--display);font-size:2rem;letter-spacing:3px;color:var(--amber-bright);line-height:1}
    .api-banner{background:var(--amber-dim);border:1px solid var(--border-lit);padding:12px 20px;font-size:.72rem;color:var(--amber);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .api-input{background:var(--bg-card);border:1px solid var(--border-lit);color:var(--text);font-family:var(--mono);font-size:.72rem;padding:6px 10px;flex:1;min-width:220px}
    .api-input:focus{outline:none;border-color:var(--amber)}
    .api-save-btn{background:var(--amber);color:#000;border:none;font-family:var(--mono);font-size:.7rem;padding:6px 14px;cursor:pointer;letter-spacing:2px;white-space:nowrap}
    .api-dismiss{color:var(--text-dim);cursor:pointer;font-size:.65rem;margin-left:auto}
    .section-tag{font-size:.58rem;letter-spacing:3px;color:var(--amber)}
    .box-label{font-size:.58rem;letter-spacing:3px;color:var(--amber);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px}
    .hub{padding:22px 0}
    .hub-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .hub-divider{height:1px;background:var(--border);margin-bottom:18px}
    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .filter-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:.58rem;letter-spacing:2px;padding:5px 10px;cursor:pointer;transition:all .2s}
    .filter-btn:hover{border-color:var(--amber);color:var(--amber)}
    .filter-active{border-color:var(--amber)!important;color:var(--amber)!important;background:var(--amber-dim)!important}
    .case-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    @media(max-width:620px){.case-grid{grid-template-columns:1fr}}
    .case-card{border:1px solid var(--border);background:var(--bg-card);padding:18px;cursor:pointer;position:relative;transition:border-color .2s,background .2s;overflow:hidden}
    .case-card::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--amber);transform:scaleY(0);transition:transform .2s;transform-origin:bottom}
    .case-card:hover{background:var(--bg-hover);border-color:var(--border-lit)}
    .case-card:hover::before{transform:scaleY(1)}
    .card-cat{font-size:.56rem;letter-spacing:3px;color:var(--amber);margin-bottom:4px}
    .card-codename{font-family:var(--display);font-size:1rem;letter-spacing:3px;color:var(--text-dim);margin-bottom:5px}
    .card-headline{font-family:var(--serif);font-size:.9rem;line-height:1.45;margin-bottom:14px}
    .card-diff{position:absolute;top:14px;right:14px;font-size:.5rem;letter-spacing:2px;padding:2px 6px;border:1px solid}
    .diff-mod{color:var(--amber);border-color:var(--amber)}
    .diff-hard{color:#FF8800;border-color:#FF8800}
    .diff-ext{color:var(--red);border-color:var(--red);animation:pulse 1.8s infinite}
    .card-meta{display:flex;gap:14px;font-size:.63rem;color:var(--text-dim);margin-bottom:10px}
    .odds-track{height:2px;background:rgba(196,34,0,.2);border-radius:1px;overflow:hidden}
    .odds-fill{height:100%;background:var(--amber)}
    .odds-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:.58rem}
    .lbl-confirm{color:var(--green-bright)}.lbl-deny{color:var(--red-bright)}
    .hub-footer{text-align:center;padding:20px 0;font-size:.58rem;letter-spacing:2px;color:var(--text-faint);border-top:1px solid var(--border);margin-top:8px}
    .back-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:.7rem;letter-spacing:2px;padding:6px 14px;cursor:pointer;margin-bottom:18px;transition:border-color .2s,color .2s;display:inline-block}
    .back-btn:hover{border-color:var(--amber);color:var(--amber)}
    .brief-screen{padding:20px 0}
    .case-file{border:1px solid var(--border);background:var(--bg-card);padding:22px;margin-bottom:14px;position:relative}
    .urgency-tag{position:absolute;top:18px;right:18px;font-size:.54rem;letter-spacing:2.5px;padding:3px 8px;border:1px solid}
    .urg-low{color:var(--text-dim);border-color:var(--text-dim)}
    .urg-med{color:var(--amber);border-color:var(--amber)}
    .urg-high{color:#FF8800;border-color:#FF8800}
    .urg-critical{color:var(--red-bright);border-color:var(--red-bright);animation:pulse 1.5s infinite}
    .file-cat{font-size:.56rem;letter-spacing:3px;color:var(--amber);margin-bottom:6px}
    .file-headline{font-family:var(--serif);font-size:1.4rem;line-height:1.3;margin-bottom:14px;padding-right:90px}
    .file-brief{font-size:.82rem;line-height:1.75;color:rgba(255,255,255,.72);margin-bottom:18px}
    .file-stats{display:flex;gap:18px;font-size:.63rem;color:var(--text-dim);border-top:1px solid var(--border);padding-top:12px;flex-wrap:wrap}
    .evidence-box{border:1px solid var(--border);background:var(--bg-card);padding:18px;margin-bottom:14px}
    .ev-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:.77rem}
    .ev-row:last-child{border-bottom:none;padding-bottom:0}
    .ev-key{color:var(--amber);min-width:175px;flex-shrink:0;line-height:1.5}
    .ev-val{color:var(--text-mid);line-height:1.5}
    @media(max-width:520px){.ev-row{flex-direction:column}.ev-key{min-width:unset}}
    .odds-pair{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .odds-box-item{border:1px solid var(--border);background:var(--bg-card);padding:14px;text-align:center}
    .ob-label{font-size:.56rem;letter-spacing:2.5px;color:var(--text-dim);margin-bottom:6px}
    .ob-value{font-family:var(--display);font-size:2.2rem;letter-spacing:2px;line-height:1}
    .ob-green{color:var(--green-bright)}.ob-red{color:var(--red-bright)}
    .hyp-box{border:1px solid var(--border);background:var(--bg-card);padding:16px;margin-bottom:18px}
    .hyp-quote{font-family:var(--serif);font-size:1rem;line-height:1.55}
    .cta-btn{width:100%;background:var(--amber);color:#000;border:none;font-family:var(--display);font-size:1.1rem;letter-spacing:5px;padding:16px;cursor:pointer;transition:background .2s}
    .cta-btn:hover{background:var(--amber-bright)}
    .analysis-screen{padding:20px 0}
    .screen-head{font-size:.58rem;letter-spacing:3px;color:var(--amber);padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:18px}
    .stance-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .stance-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--display);font-size:1rem;letter-spacing:3px;padding:14px;cursor:pointer;transition:all .2s}
    .stance-btn:hover{border-color:var(--text-mid);color:var(--text)}
    .stance-confirm{background:var(--green-dim)!important;border-color:var(--green)!important;color:var(--green-bright)!important}
    .stance-deny{background:var(--red-dim)!important;border-color:var(--red)!important;color:var(--red-bright)!important}
    .area-label{display:flex;justify-content:space-between;align-items:center;font-size:.58rem;letter-spacing:2.5px;color:var(--amber);margin-bottom:8px}
    .area-hint{color:var(--text-faint);letter-spacing:1px;font-size:.54rem}
    .reasoning-input{width:100%;background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.82rem;line-height:1.75;padding:16px;resize:vertical;min-height:150px;transition:border-color .2s}
    .reasoning-input:focus{outline:none;border-color:var(--amber)}
    .reasoning-input::placeholder{color:var(--text-faint)}
    .char-bar{display:flex;justify-content:space-between;margin-top:5px;font-size:.6rem;color:var(--text-dim)}
    .char-good{color:var(--green)}
    .sub-label{font-size:.58rem;letter-spacing:3px;color:var(--amber);margin-bottom:8px}
    .sub-note{font-size:.72rem;color:var(--text-dim);line-height:1.65;margin-bottom:10px}
    .stake-row{border:1px solid var(--border);background:var(--bg-card);padding:13px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:8px;transition:border-color .2s,background .2s;font-size:.78rem}
    .stake-row:hover{border-color:var(--amber)}
    .stake-selected{border-color:var(--amber)!important;background:var(--amber-dim)!important}
    .stake-time{font-size:.62rem;color:var(--text-dim);margin-left:14px;white-space:nowrap}
    .submit-btn{width:100%;background:transparent;border:1px solid var(--amber);color:var(--amber);font-family:var(--display);font-size:1rem;letter-spacing:4px;padding:16px;cursor:pointer;transition:background .2s,color .2s}
    .submit-btn:hover:not([disabled]){background:var(--amber);color:#000}
    .submit-btn[disabled]{border-color:var(--text-faint);color:var(--text-faint);cursor:not-allowed}
    .loading-screen{display:flex;flex-direction:column;align-items:center;padding:70px 0}
    .load-title{font-family:var(--display);font-size:1.3rem;letter-spacing:6px;color:var(--amber);margin-bottom:28px}
    .term-line{font-size:.72rem;letter-spacing:1px;padding:3px 0;animation:fadeUp .3s ease both;width:100%;max-width:480px}
    .t-ok{color:var(--green-bright)}.t-warn{color:#FF8800}.t-dim{color:var(--text-faint)}
    .blink-cur{width:8px;height:18px;background:var(--amber);display:inline-block;margin-top:14px;animation:blink .8s step-start infinite}
    .verdict-screen{padding:20px 0}
    .verdict-frame{border-width:2px;border-style:solid;padding:26px;margin-bottom:16px;text-align:center}
    .vf-verified{border-color:var(--green)}.vf-insufficient{border-color:var(--amber)}.vf-rejected{border-color:var(--red)}
    .verdict-stamp{font-family:var(--display);font-size:2.8rem;letter-spacing:10px;display:block;margin-bottom:6px}
    .vs-verified{color:var(--green-bright)}.vs-insufficient{color:var(--amber-bright)}.vs-rejected{color:var(--red-bright)}
    .verdict-score{font-family:var(--display);font-size:5rem;letter-spacing:4px;line-height:1}
    .score-verified{color:var(--green-bright)}.score-insufficient{color:var(--amber-bright)}.score-rejected{color:var(--red-bright)}
    .score-sub{font-size:.58rem;letter-spacing:3px;color:var(--text-dim);margin:6px 0 10px}
    .vp-delta{font-family:var(--display);font-size:1.1rem;letter-spacing:3px}
    .delta-pos{color:var(--green-bright)}.delta-neg{color:var(--red-bright)}.delta-zero{color:var(--text-dim)}
    .verdict-summary{border:1px solid var(--border);background:var(--bg-card);padding:18px;margin-bottom:14px;font-size:.82rem;line-height:1.75;color:rgba(255,255,255,.78)}
    .sw-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    @media(max-width:580px){.sw-grid{grid-template-columns:1fr}}
    .sw-box{border:1px solid var(--border);background:var(--bg-card);padding:16px}
    .sw-head{font-size:.56rem;letter-spacing:3px;margin-bottom:10px}
    .sw-green{color:var(--green-bright)}.sw-red{color:var(--red-bright)}
    .sw-item{font-size:.78rem;line-height:1.55;color:var(--text-mid);padding:6px 0;border-bottom:1px solid var(--border)}
    .sw-item:last-child{border-bottom:none;padding-bottom:0}
    .conclusion-box{border:1px solid var(--border);background:var(--bg-card);padding:18px;margin-bottom:20px}
    .action-btn{width:100%;border:none;font-family:var(--display);font-size:1rem;letter-spacing:5px;padding:16px;cursor:pointer;transition:opacity .2s;margin-bottom:10px}
    .action-btn:hover{opacity:.88}
    .btn-amber{background:var(--amber);color:#000}.btn-red{background:var(--red);color:#fff}
    .debt-screen{padding:20px 0}
    .debt-header{border:2px solid var(--red);background:var(--red-dim);padding:24px;margin-bottom:16px;text-align:center}
    .debt-title{font-family:var(--display);font-size:2rem;letter-spacing:7px;color:var(--red-bright);margin-bottom:10px}
    .debt-sub{font-size:.72rem;color:rgba(255,255,255,.55);letter-spacing:1.5px;line-height:1.7}
    .debt-task{border:1px solid var(--red);background:var(--bg-card);padding:20px;margin-bottom:16px}
    .debt-task-label{font-size:.56rem;letter-spacing:3px;color:var(--red-bright);margin-bottom:10px}
    .debt-task-text{font-family:var(--serif);font-size:1rem;line-height:1.65}
    .honor-text{font-size:.68rem;color:var(--text-faint);line-height:1.75;text-align:center;padding:16px;border:1px dashed rgba(255,255,255,.1);margin-bottom:20px}
    .clear-debt-btn{width:100%;background:transparent;border:1px solid var(--green);color:var(--green-bright);font-family:var(--display);font-size:1rem;letter-spacing:5px;padding:16px;cursor:pointer;transition:background .2s}
    .clear-debt-btn:hover{background:var(--green-dim)}
  </style>
</head>

function scoreLocally(r,c){
  const w=r.trim().split(/\s+/).length;
  const refs=c.evidence.filter(e=>r.toLowerCase().includes(e.label.toLowerCase().split(" ")[0])).length;
  const s=Math.min(100,Math.max(15,Math.round(w*1.6+refs*12+8)));
  const v=s>=70?"VERIFIED":s>=40?"INSUFFICIENT":"REJECTED";
  const d=v==="VERIFIED"?Math.min(30,Math.round((s-60)/2)):v==="REJECTED"?-10:0;
  return{score:s,verdict:v,vpDelta:d,
    summary:`Your analysis ${s>=60?"demonstrates reasonable":"shows limited"} engagement with the available evidence. ${s>=70?"The reasoning chain is logically structured.":"More specific evidence engagement would strengthen the analytical case."}`,
    strengths:s>=50?["Formed a clear positional stance","Engaged with the case context"]:["Submitted an analysis for community review"],
    weaknesses:s<70?["Could engage more specifically with individual evidence items","Consider alternative explanations more explicitly"]:["Minor logical gaps in the causal chain"],
    conclusion:"Continue developing your investigative methodology to improve your Verification Power score."};
}

            <span className={`verdict-stamp vs-${vl}`}>{verdict.verdict}</span>
            <div className={`verdict-score score-${vl}`}>{verdict.score}</div>
            <div className="score-sub">ANALYTICAL QUALITY SCORE / 100</div>
            <div className={`vp-delta ${verdict.vpDelta>0?"delta-pos":verdict.vpDelta<0?"delta-neg":"delta-zero"}`}>
              {verdict.vpDelta>0?`+${verdict.vpDelta} VP EARNED`:verdict.vpDelta<0?`${verdict.vpDelta} VP PENALTY`:"NO VP CHANGE"}
            </div>
          </div>
          <div className="verdict-summary">
            <div className="box-label">◆ ANALYTICAL REVIEW</div>
            {verdict.summary}
          </div>
          <div className="sw-grid">
            <div className="sw-box">
              <div className="sw-head sw-green">◆ STRENGTHS</div>
              {(verdict.strengths||[]).map((s,i)=><div key={i} className="sw-item">{s}</div>)}
            </div>
            <div className="sw-box">
              <div className="sw-head sw-red">◆ AREAS TO DEVELOP</div>
              {(verdict.weaknesses||[]).map((w,i)=><div key={i} className="sw-item">{w}</div>)}
            </div>
          </div>
          <div className="conclusion-box">
            <div className="box-label">◆ ANALYST CONCLUSION</div>
            <div style={{fontSize:".82rem",lineHeight:1.75,color:"rgba(255,255,255,.78)"}}>{verdict.conclusion}</div>
          </div>
          {verdict.verdict==="REJECTED"?(
            <>
              <div style={{textAlign:"center",padding:14,fontSize:".7rem",letterSpacing:"2px",color:"var(--red-bright)",border:"1px solid var(--red)",marginBottom:14}}>
                INTELLECTUAL DEBT RECORDED — COMPLETE YOUR STAKED TASK TO CONTINUE
              </div>
              <button className="action-btn btn-red" onClick={()=>setScreen("debt")}>VIEW DEBT OBLIGATION →</button>
            </>
          ):(
            <button className="action-btn btn-amber" onClick={reset}>NEXT INVESTIGATION →</button>
          )}
        </div>
      )}

      {screen==="debt"&&debt&&(
        <div className="wrap debt-screen screen">
          <div className="debt-header">
            <div className="debt-title">INTELLECTUAL DEBT</div>
            <div className="debt-sub">SYSTEM LOCKED // CASE {debt.codename}<br/>Complete your staked research obligation to restore platform access.</div>
          </div>
          <div className="debt-task">
            <div className="debt-task-label">◆ YOUR STAKED RESEARCH OBLIGATION</div>
            <div className="debt-task-text">{debt.task}</div>
          </div>
          <div className="honor-text">
            This is an honor system. The entire platform runs on trust in the investigative process.<br/>
            Do not click below until you have genuinely completed this research task.<br/>
            Our collective integrity is the only thing that makes this work matter.
          </div>
          <button className="clear-debt-btn" onClick={clearDebt}>✓ RESEARCH TASK COMPLETED — UNLOCK SYSTEM</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
